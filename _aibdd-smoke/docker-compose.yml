services:
  postgres:
    image: postgres:18
    container_name: member-auth-api-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: member-auth-api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d member-auth-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
